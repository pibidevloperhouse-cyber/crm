<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRM Bot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .log-panel {
      transform: translateX(100%);
      transition: transform 0.4s ease;
    }
    .log-panel.open {
      transform: translateX(0);
    }
  </style>
</head>
<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-4xl font-bold text-gray-800 mb-8">CRM Bot Dashboard</h1>

  <!-- Top Bar -->
  <div class="flex gap-4 mb-6">
    <button onclick="loadData('lead')" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-medium hover:bg-blue-700">Leads</button>
    <button onclick="loadData('deal')" class="px-6 py-3 bg-emerald-600 text-white rounded-2xl font-medium hover:bg-emerald-700">Deals</button>
    <button onclick="loadData('customer')" class="px-6 py-3 bg-purple-600 text-white rounded-2xl font-medium hover:bg-purple-700">Customers</button>
    
    <button onclick="toggleLogs()" 
            class="ml-auto px-6 py-3 bg-gray-800 text-white rounded-2xl font-medium hover:bg-gray-900 flex items-center gap-2">
      <i class="fas fa-terminal"></i> Live Logs
    </button>
  </div>

  <!-- Search -->
  <input id="search" placeholder="Search by name or email..." 
         class="w-full px-5 py-4 border border-gray-300 rounded-3xl text-lg focus:outline-none focus:border-blue-500 mb-8">

  <!-- Items Grid -->
  <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<!-- Logs Side Panel -->
<div id="logPanel" class="log-panel fixed top-0 right-0 h-full w-96 bg-black text-green-400 font-mono text-sm shadow-2xl overflow-hidden z-50">
  <div class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700">
    <h2 class="font-semibold text-white flex items-center gap-2">
      <i class="fas fa-terminal"></i> Live Terminal Logs
    </h2>
    <button onclick="toggleLogs()" class="text-gray-400 hover:text-white text-xl">✕</button>
  </div>
  <div id="logs" class="p-4 h-[calc(100%-60px)] overflow-y-auto whitespace-pre-wrap"></div>
</div>

<script>
  let currentType = "lead";

  async function loadData(type) {
    currentType = type;
    const res = await fetch(`/api/data?type=${type}`);
    const data = await res.json();
    renderList(data);
  }

  function renderList(data) {
    const container = document.getElementById("list");
    container.innerHTML = data.map(item => `
      <div onclick="openDetail('${item.type}', ${item.id})" 
           class="bg-white rounded-3xl shadow hover:shadow-2xl transition p-6 cursor-pointer border border-gray-100">
        <div class="flex justify-between items-start">
          <div>
            <h3 class="font-semibold text-xl">${item.name || 'No Name'}</h3>
            <p class="text-gray-500 text-sm">${item.email}</p>
          </div>
          <span class="px-4 py-1 text-xs font-medium rounded-2xl ${item.status === 'Meeting Booked' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}">
            ${item.status || 'New'}
          </span>
        </div>
        <p class="text-xs text-gray-400 mt-4">${item.created_at ? new Date(item.created_at).toLocaleDateString() : ''}</p>
      </div>
    `).join('');
  }


  function openDetail(type, id) {
    if (type === 'lead') {
      window.location.href = `/detail/lead/${id}`;
    } else {
      alert(`Detail for ${type} coming soon`);
    }
  } 
  // Live Logs Panel
  let logsOpen = false;

  function toggleLogs() {
    logsOpen = !logsOpen;
    document.getElementById("logPanel").classList.toggle("open", logsOpen);
  }

  async function fetchLogs() {
    try {
      const res = await fetch('/api/logs');
      const data = await res.json();
      document.getElementById("logs").textContent = data.join('\n');
    } catch(e) {}
  }

  // Auto refresh logs every 2 seconds
  setInterval(fetchLogs, 2000);

  // Initial load
  window.onload = () => {
    loadData('lead');
    fetchLogs();
  };

  // Search
  document.getElementById("search").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const cards = document.querySelectorAll("#list > div");
    cards.forEach(card => {
      card.style.display = card.textContent.toLowerCase().includes(term) ? "" : "none";
    });
  });
</script>
</body>
</html>
